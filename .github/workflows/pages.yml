name: Deploy Next.js static export to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Supabase public host
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          node - <<'NODE'
          const dns = require("node:dns").promises;

          async function main() {
            const publicUrl = process.env.NEXT_PUBLIC_SUPABASE_URL;
            const anonKey = process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY;

            if (!publicUrl) {
              throw new Error("NEXT_PUBLIC_SUPABASE_URL is required for live metrics.");
            }

            if (!anonKey) {
              throw new Error("NEXT_PUBLIC_SUPABASE_ANON_KEY is required for live metrics.");
            }

            const parsed = new URL(publicUrl);
            if (parsed.protocol !== "https:" || !parsed.hostname.endsWith(".supabase.co")) {
              throw new Error("NEXT_PUBLIC_SUPABASE_URL must be an https://*.supabase.co URL.");
            }

            await dns.lookup(parsed.hostname);
            console.log(`Supabase host resolves: ${parsed.hostname}`);
          }

          main().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          NODE

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /claimer
          NEXT_PUBLIC_SITE_URL: https://claimer-org.github.io/claimer
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_GOOGLE_AUTH_ENABLED: ${{ vars.NEXT_PUBLIC_GOOGLE_AUTH_ENABLED || 'false' }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify WebSub hub of updated feeds
        if: success()
        run: |
          curl -s -o /dev/null -w "RSS WebSub: %{http_code}\n" \
            -X POST -d "hub.mode=publish" \
            -d "hub.url=https://claimer-org.github.io/claimer/feed.xml" \
            "https://pubsubhubbub.appspot.com/"
          curl -s -o /dev/null -w "JSON WebSub: %{http_code}\n" \
            -X POST -d "hub.mode=publish" \
            -d "hub.url=https://claimer-org.github.io/claimer/feed.json" \
            "https://pubsubhubbub.appspot.com/"

      - name: Checkout repository for release scripts
        if: success()
        uses: actions/checkout@v4

      - name: Ping IndexNow with latest URLs
        if: success()
        env:
          INDEXNOW_KEY: 86c6a461-1494-40f5-9f4f-475741a130ad
        run: npm run submit:indexnow
