name: Deploy Supabase contributor backend

"on":
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-contributor-backend
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_REF: fousbbxquhayqnqdpwcf
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

jobs:
  deploy:
    name: Deploy migrations and functions
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          set -euo pipefail

          missing=()

          if [[ -z "${SUPABASE_ACCESS_TOKEN:-}" ]]; then
            missing+=("SUPABASE_ACCESS_TOKEN")
          fi

          if [[ -z "${SUPABASE_DB_PASSWORD:-}" ]]; then
            missing+=("SUPABASE_DB_PASSWORD")
          fi

          if (( ${#missing[@]} > 0 )); then
            printf '::error::Missing required GitHub Actions secrets: %s\n' "${missing[*]}" >&2
            printf '::error::Add the missing repository secrets before dispatching this workflow again.\n' >&2
            exit 1
          fi

          printf 'Required Supabase deploy secrets are present by name.\n'

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Show Supabase CLI version
        run: supabase --version

      - name: Link Supabase project
        run: |
          set -euo pipefail

          supabase link \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --password "$SUPABASE_DB_PASSWORD" \
            --yes

      - name: Show linked migration state before apply
        run: supabase migration list --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Apply Supabase migrations
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD" --yes

      - name: Show linked migration state after apply
        run: supabase migration list --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy contributor Edge Functions
        run: |
          set -euo pipefail

          functions=(register tasks claims evidence feedback)

          for function_name in "${functions[@]}"; do
            printf 'Deploying Supabase function: %s\n' "$function_name"
            supabase functions deploy "$function_name" \
              --project-ref "$SUPABASE_PROJECT_REF" \
              --no-verify-jwt \
              --use-api
          done

      - name: Probe live registration endpoint
        run: |
          set -euo pipefail

          response_body="$(mktemp)"
          status_code="$(
            curl -sS -o "$response_body" -w '%{http_code}' \
              -X POST "https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/register" \
              -H 'Content-Type: application/json' \
              -d '{}'
          )"

          printf 'register_http_status=%s\n' "$status_code"

          if [[ "$status_code" != "200" && "$status_code" != "201" ]]; then
            printf '::error::Register probe failed with HTTP %s.\n' "$status_code" >&2
            cat "$response_body" >&2
            exit 1
          fi

          node - "$response_body" <<'NODE'
          const fs = require("node:fs");
          const bodyPath = process.argv[2];
          const body = fs.readFileSync(bodyPath, "utf8");
          const uuidPattern = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;

          let parsed;
          try {
            parsed = JSON.parse(body);
          } catch (error) {
            console.error("Register probe did not return JSON.");
            process.exit(1);
          }

          if (!parsed || typeof parsed.token !== "string" || !uuidPattern.test(parsed.token)) {
            console.error("Register probe did not return a UUID token.");
            process.exit(1);
          }

          console.log("register_returns_uuid_token=true");
          NODE
